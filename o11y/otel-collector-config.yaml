# OpenTelemetry Collector Configuration
# Receives telemetry from mobile apps and forwards to SigNoz Cloud

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:
          allowed_origins:
            - "*"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1000

  # Add resource attributes to all telemetry
  resource:
    attributes:
      - key: service.name
        value: fastbreak-mobile
        action: upsert
      - key: deployment.environment
        value: production
        action: upsert

  # Memory limiter to prevent OOM
  memory_limiter:
    check_interval: 1s
    limit_mib: 400
    spike_limit_mib: 100

exporters:
  # SigNoz Cloud exporter
  otlp/signoz:
    endpoint: ${env:SIGNOZ_ENDPOINT}
    tls:
      insecure: false
    headers:
      signoz-ingestion-key: ${env:SIGNOZ_INGESTION_KEY}

  # Debug logging (disable in production by removing from pipelines)
  debug:
    verbosity: basic

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

  zpages:
    endpoint: 0.0.0.0:55679

service:
  extensions: [health_check, zpages]

  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlp/signoz]

    metrics:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlp/signoz]

    logs:
      receivers: [otlp]
      processors: [memory_limiter, batch, resource]
      exporters: [otlp/signoz]
