name: Deploy to TestFlight

on:
  push:
    branches:
      - main
    paths:
      - 'kmp/**'

jobs:
  deploy:
    runs-on: macos-26
    defaults:
      run:
        working-directory: kmp

    steps:
      - uses: actions/checkout@v4

      # Apple requires apps to be built with the iOS 26 SDK / Xcode 26 or later
      # for App Store Connect submissions starting April 2026. On the macos-26
      # arm64 runner image Xcode 26.2 is the default install, located at
      # /Applications/Xcode_26.2.app (verified against actions/runner-images
      # macos-26-arm64-Readme.md).
      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-home-cache-cleanup: true

      # Cache the Kotlin/Native toolchain (compiler, LLVM, libffi, etc.) which
      # is downloaded into ~/.konan on first run and weighs ~1.5GB. Keyed on
      # the Kotlin version from the version catalog so it invalidates on
      # upgrades.
      - name: Cache Kotlin/Native (~/.konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: ${{ runner.os }}-${{ runner.arch }}-konan-${{ hashFiles('kmp/gradle/libs.versions.toml', 'kmp/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-konan-

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: kmp/iosApp

      - name: Cache CocoaPods
        uses: actions/cache@v4
        with:
          path: |
            kmp/iosApp/Pods
            ~/Library/Caches/CocoaPods
          key: ${{ runner.os }}-pods-${{ hashFiles('kmp/iosApp/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-pods-

      - name: Build KMP Framework
        run: ./gradlew :shared:linkReleaseFrameworkIosArm64 --build-cache --parallel

      - name: Install CocoaPods
        working-directory: kmp/iosApp
        run: bundle exec pod install

      - name: Setup SSH for Match
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_SSH_PRIVATE_KEY }}

      - name: Deploy to TestFlight
        working-directory: kmp/iosApp
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          BUILD_NUMBER: ${{ github.run_number }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: bundle exec fastlane ios beta