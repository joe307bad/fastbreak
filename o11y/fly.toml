# Fly.io configuration for QuestDB + Caddy multi-container
app = "fastbreak-o11y"
primary_region = "iad"

# Using pre-built image instead of Dockerfile for multi-container
[build]
image = "registry.fly.io/fastbreak-o11y:caddy-v20"

[experimental]
machine_config = "machine-config.json"
container = "caddy"

[http_service]
internal_port = 80
force_https = true
auto_stop_machines = "stop"
auto_start_machines = true
min_machines_running = 1

[http_service.concurrency]
type = "connections"
hard_limit = 100
soft_limit = 80

[[http_service.checks]]
interval = "30s"
timeout = "5s"
grace_period = "30s"
method = "GET"
path = "/health"
port = 80

# Persistent storage - single volume for all data
# Subdirectories: /data/questdb and /data/grafana
[[mounts]]
source = "o11y_data"
destination = "/data"

[[vm]]
memory = "2gb"
cpu_kind = "shared"
cpus = 1
