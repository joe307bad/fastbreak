name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'kmp/**'
      - 'pipeline/04-fastbreak-charts/**'
      - 'server/src/Fastbreak.Daily/**'

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      kmp: ${{ steps.changes.outputs.kmp }}
      charts: ${{ steps.changes.outputs.charts }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            kmp:
              - 'kmp/**'
            charts:
              - 'pipeline/04-fastbreak-charts/**'
              - 'server/src/Fastbreak.Daily/**'

  deploy-charts:
    needs: detect-changes
    if: needs.detect-changes.outputs.charts == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline/04-fastbreak-charts

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build Fastbreak.Daily executable
        run: |
          dotnet publish -c Release -r linux-x64 --self-contained true -p:PublishSingleFile=true -o ../../../pipeline/04-fastbreak-charts
        working-directory: server/src/Fastbreak.Daily

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Verify Fastbreak.Daily exists
        run: ls -la Fastbreak.Daily

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-android:
    needs: [detect-changes, deploy-charts]
    if: |
      always() &&
      needs.detect-changes.outputs.kmp == 'true' &&
      (needs.deploy-charts.result == 'success' || needs.deploy-charts.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kmp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3

      - name: Generate build info
        id: build_info
        run: |
          BUILD_NUMBER=$((1000 + ${{ github.run_number }}))
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          VERSION_NAME=$(grep "VERSION_NAME=" gradle.properties | cut -d'=' -f2)
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT

      - name: Write local.properties
        run: |
          cat > local.properties << EOF
          GOOGLE_AUTH_SERVER_ID=${{ secrets.GOOGLE_AUTH_SERVER_ID }}
          API_BASE_URL=https://d2jyizt5xogu23.cloudfront.net
          RELEASE_STORE_FILE=../release-keystore.jks
          RELEASE_KEY_ALIAS=${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD=${{ secrets.RELEASE_KEY_PASSWORD }}
          RELEASE_STORE_PASSWORD=${{ secrets.RELEASE_STORE_PASSWORD }}
          EOF

      - name: Create keystore
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE }}" | base64 -d > release-keystore.jks

      - name: Verify telemetry secrets
        run: |
          if [ -n "${{ secrets.OTEL_ENDPOINT }}" ]; then echo "OTEL_ENDPOINT is set"; else echo "WARNING: OTEL_ENDPOINT is empty"; fi
          if [ -n "${{ secrets.OTEL_AUTH_TOKEN }}" ]; then echo "OTEL_AUTH_TOKEN is set"; else echo "WARNING: OTEL_AUTH_TOKEN is empty"; fi

      - name: Clean generated config (force regeneration)
        run: rm -rf shared/build/generated/appconfig

      - name: Build Android App Bundle
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
        run: |
          ./gradlew :androidApp:bundleRelease --no-daemon --no-build-cache \
            -PVERSION_NAME="${{ steps.build_info.outputs.version_name }}" \
            -PVERSION_CODE="${{ steps.build_info.outputs.build_number }}" \
            -Pdev_mode=false \
            -Potel_endpoint="${{ secrets.OTEL_ENDPOINT }}" \
            -Potel_auth_token="${{ secrets.OTEL_AUTH_TOKEN }}"
          echo "=== Generated AppConfig.kt ==="
          cat shared/build/generated/appconfig/com/joebad/fastbreak/config/AppConfig.kt

      - name: Upload to Google Play Alpha
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.joebad.fastbreak
          releaseFiles: kmp/androidApp/build/outputs/bundle/release/*.aab
          track: alpha
          status: draft

  deploy-ios:
    needs: [detect-changes, deploy-charts]
    if: |
      always() &&
      needs.detect-changes.outputs.kmp == 'true' &&
      (needs.deploy-charts.result == 'success' || needs.deploy-charts.result == 'skipped')
    runs-on: macos-26
    defaults:
      run:
        working-directory: kmp

    steps:
      - uses: actions/checkout@v4

      # Apple requires apps to be built with the iOS 26 SDK / Xcode 26 or later
      # for App Store Connect submissions starting April 2026. On the macos-26
      # arm64 runner image Xcode 26.2 is the default install, located at
      # /Applications/Xcode_26.2.app (verified against actions/runner-images
      # macos-26-arm64-Readme.md).
      - name: Select Xcode 26.2
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Get version from gradle.properties
        id: build_info
        run: |
          BUILD_NUMBER=$((1000 + ${{ github.run_number }}))
          echo "build_number=${BUILD_NUMBER}" >> $GITHUB_OUTPUT
          VERSION_NAME=$(grep "VERSION_NAME=" gradle.properties | cut -d'=' -f2)
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION_NAME, build: $BUILD_NUMBER"

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
          working-directory: kmp/iosApp

      - name: Verify telemetry secrets
        run: |
          if [ -n "${{ secrets.OTEL_ENDPOINT }}" ]; then echo "OTEL_ENDPOINT is set"; else echo "WARNING: OTEL_ENDPOINT is empty"; fi
          if [ -n "${{ secrets.OTEL_AUTH_TOKEN }}" ]; then echo "OTEL_AUTH_TOKEN is set"; else echo "WARNING: OTEL_AUTH_TOKEN is empty"; fi

      - name: Clean generated config (force regeneration)
        run: rm -rf shared/build/generated/appconfig

      - name: Build KMP Framework
        run: |
          ./gradlew :shared:linkReleaseFrameworkIosArm64 --no-build-cache \
            -Pdev_mode=false \
            -Potel_endpoint="${{ secrets.OTEL_ENDPOINT }}" \
            -Potel_auth_token="${{ secrets.OTEL_AUTH_TOKEN }}"
          echo "=== Generated AppConfig.kt ==="
          cat shared/build/generated/appconfig/com/joebad/fastbreak/config/AppConfig.kt

      - name: Install CocoaPods
        working-directory: kmp/iosApp
        run: bundle exec pod install

      - name: Setup SSH for Match
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_SSH_PRIVATE_KEY }}

      - name: Deploy to TestFlight
        working-directory: kmp/iosApp
        env:
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          VERSION_NAME: ${{ steps.build_info.outputs.version_name }}
          BUILD_NUMBER: ${{ steps.build_info.outputs.build_number }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          # fastlane's build_app triggers xcodebuild, whose "Compile Kotlin
          # Framework" build phase runs ./gradlew :shared:embedAndSignAppleFrameworkForXcode
          # with no -P flags. That regenerates AppConfig.kt from gradle.properties
          # defaults (dev_mode=true), overwriting the framework built earlier.
          # Pass the values via ORG_GRADLE_PROJECT_* so that in-Xcode Gradle run
          # picks them up and produces a prod (dev_mode=false) framework.
          ORG_GRADLE_PROJECT_dev_mode: "false"
          ORG_GRADLE_PROJECT_otel_endpoint: ${{ secrets.OTEL_ENDPOINT }}
          ORG_GRADLE_PROJECT_otel_auth_token: ${{ secrets.OTEL_AUTH_TOKEN }}
        run: bundle exec fastlane ios beta
