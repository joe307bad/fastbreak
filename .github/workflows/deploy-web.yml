name: Deploy Web to Fly.io

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8:00 AM UTC
  push:
    branches:
      - main
    paths:
      - 'web/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        working-directory: web
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        # CACHEBUST is wired into the Dockerfile so the chart-download +
        # next build layer is re-run every time this workflow does. We use
        # the run id (unique per workflow execution) so manual dispatches,
        # pushes, and the daily cron all bypass the cache.
        run: flyctl deploy --remote-only --build-arg CACHEBUST=${{ github.run_id }}
